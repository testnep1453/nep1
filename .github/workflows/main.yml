name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Inject Firebase config to SW
        run: |
          sed -i 's/YOUR_API_KEY/${{ secrets.VITE_FIREBASE_API_KEY }}/g' public/firebase-messaging-sw.js
          sed -i 's/YOUR_AUTH_DOMAIN/${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}/g' public/firebase-messaging-sw.js
          sed -i 's/YOUR_PROJECT_ID/${{ secrets.VITE_FIREBASE_PROJECT_ID }}/g' public/firebase-messaging-sw.js
          sed -i 's/YOUR_STORAGE_BUCKET/${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}/g' public/firebase-messaging-sw.js
          sed -i 's/YOUR_MESSAGING_SENDER_ID/${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}/g' public/firebase-messaging-sw.js
          sed -i 's/YOUR_APP_ID/${{ secrets.VITE_FIREBASE_APP_ID }}/g' public/firebase-messaging-sw.js
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
